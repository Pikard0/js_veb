<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Лабораторна 6 - Товари</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="header">
  <h1>Каталог товарів</h1>
  <div class="total-price-container">
    Загальна вартість: <span id="totalPrice">0 ₴</span>
  </div>
</header>

<main class="container">
  <aside class="controls">
    <div class="control-group">
      <h3>Фільтрація (Категорії)</h3>
      <button class="filter-btn" data-category="Електроніка">Електроніка</button>
      <button class="filter-btn" data-category="Одяг">Одяг</button>
      <button class="filter-btn" data-category="Книги">Книги</button>
      <button class="filter-btn reset-btn" id="resetFilterBtn">Скинути фільтр</button>
    </div>

    <div class="control-group">
      <h3>Сортування</h3>
      <button class="sort-btn" data-sort="price">За ціною</button>
      <button class="sort-btn" data-sort="created">За датою створення</button>
      <button class="sort-btn" data-sort="updated">За датою оновлення</button>
      <button class="sort-btn reset-btn" id="resetSortBtn">Скинути сортування</button>
    </div>
  </aside>

  <section class="products-section">
    <div id="emptyMessage" class="empty-message">Наразі список товарів пустий. Додайте новий товар.</div>
    <div id="productList" class="product-list"></div>
    <button id="openAddModalBtn" class="primary-btn mt-2">Додати новий товар</button>
  </section>
</main>

<div id="productModal" class="modal hidden">
  <div class="modal-content">
    <h2 id="modalTitle">Додати товар</h2>
    <form id="productForm">
      <input type="hidden" id="productId">
      <div class="form-group">
        <label for="productName">Назва товару:</label>
        <input type="text" id="productName" required minlength="2">
      </div>
      <div class="form-group">
        <label for="productPrice">Ціна (₴):</label>
        <input type="number" id="productPrice" required min="0.01" step="0.01">
      </div>
      <div class="form-group">
        <label for="productCategory">Категорія:</label>
        <select id="productCategory" required>
          <option value="Електроніка">Електроніка</option>
          <option value="Одяг">Одяг</option>
          <option value="Книги">Книги</option>
        </select>
      </div>
      <div class="form-group">
        <label for="productImage">URL зображення:</label>
        <input type="url" id="productImage" required>
      </div>
      <div class="modal-actions">
        <button type="submit" class="success-btn">Зберегти</button>
        <button type="button" id="closeModalBtn" class="danger-btn">Скасувати</button>
      </div>
    </form>
  </div>
</div>

<div id="snackbar" class="snackbar">Повідомлення</div>

<script src="lab-6.js"></script>
</body>
</html>
