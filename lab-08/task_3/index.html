<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Task_3</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="kanban">

<script src="script.js"></script>
</body>
</html>
